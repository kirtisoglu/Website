<html lang="en">
	<head>

		<link rel="icon" href="%sveltekit.assets%/favicon.ico" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Mukta&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />

		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.15.1/dist/katex.min.css"
			integrity="sha384-R4558gYOUz8mP9YWpZJjofhk+zx0AS11p36HnD2ZKj/6JR5z27gSSULCNHIRReVs" crossorigin="anonymous" />
		<script defer src="https://cdn.jsdelivr.net/npm/katex@0.15.1/dist/katex.min.js"
			integrity="sha384-z1fJDqw8ZApjGO3/unPWUPsIymfsJmyrDVWC8Tv/a1HeOtGmkwNd/7xUS0Xcnvsx"
			crossorigin="anonymous"></script>
		<script defer src="https://cdn.jsdelivr.net/npm/katex@0.15.1/dist/contrib/auto-render.min.js"
			integrity="sha384-+XBljXPPiv+OzfbB3cVmLHf4hdUFHlWNZN5spNQ7rmHTXpd7WvJum6fIACpNNfIR" crossorigin="anonymous"></script>

		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "Person",
				"name": "Alaittin Kirtisoglu",
				"url": "https://akirtisoglu.me",
				"image": "https://akirtisoglu.me/about/portrait.webp",
				"jobTitle": "PhD Candidate in Applied Mathematics",
				"affiliation": {
					"@type": "Organization",
					"name": "Illinois Institute of Technology",
					"url": "https://www.iit.edu"
				},
				"alumniOf": {
					"@type": "Organization",
					"name": "Middle East Technical University"
				},
				"knowsAbout": [
					"Combinatorial Optimization",
					"Algorithm Design",
					"Graph Theory",
					"Computational Districting",
					"Facility Location",
					"Healthcare Network Design"
				],
				"sameAs": [
					"https://github.com/kirtisoglu",
					"https://scholar.google.com/citations?user=A1faWlMAAAAJ&hl=en",
					"https://www.linkedin.com/in/alaittin-kirtisoglu",
					"https://www.researchgate.net/profile/Alaittin-Kirtisoglu"
				]
			}
		</script>
		%sveltekit.head%
	</head>
	<!--
		data-sveltekit-reload forces a full HTML reload on every internal
		link click instead of SPA navigation. Workaround for a Svelte 4
		hydration race triggered by the route-group layout: the deeper
		generated root.svelte + the layout's {#if segment} branch flip
		intermittently detached the slot's anchor text-node during nav,
		causing "Cannot read properties of null (reading 'insertBefore')"
		and blank pages after clicking the nav. Full reload sidesteps the
		nav-time patch entirely.
	-->
	<body data-sveltekit-preload-data="hover" data-sveltekit-reload>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
